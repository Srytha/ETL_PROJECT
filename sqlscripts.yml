crear_esquemas: |
  CREATE SCHEMA IF NOT EXISTS data_mart_entregas;
  CREATE SCHEMA IF NOT EXISTS data_mart_novedades;

dim_cliente: |
  CREATE TABLE IF NOT EXISTS data_mart_entregas.dim_cliente (
      id_cliente INT PRIMARY KEY,
      nombre_cliente VARCHAR(100),
      tipo_cliente VARCHAR(50),
      email VARCHAR(100),
      telefono VARCHAR(30),
      sector VARCHAR(100),
      saved DATE
  );

dim_sede: |
  CREATE TABLE IF NOT EXISTS data_mart_entregas.dim_sede (
      id_sede INT PRIMARY KEY,
      nombre_sede VARCHAR(100),
      ciudad VARCHAR(100),
      departamento VARCHAR(100),
      direccion VARCHAR(200),
      saved DATE
  );

dim_estado: |
  CREATE TABLE IF NOT EXISTS data_mart_entregas.dim_estado (
      id_estado INT PRIMARY KEY,
      nombre_estado VARCHAR(100),
      descripcion VARCHAR(200),
      saved DATE
  );

dim_tiempo: |
  CREATE TABLE IF NOT EXISTS data_mart_entregas.dim_tiempo (
      id_tiempo INT PRIMARY KEY,
      fecha DATE,
      año INT,
      mes INT,
      semana INT,
      dia INT,
      fin_de_semana BOOLEAN,
      saved DATE
  );

dim_hora: |
  CREATE TABLE IF NOT EXISTS data_mart_entregas.dim_hora (
      id_hora INT PRIMARY KEY,
      hora INT,
      saved DATE
  );

dim_hora_novedades: |
  CREATE TABLE IF NOT EXISTS data_mart_novedades.dim_hora (
      id_hora INT PRIMARY KEY,
      hora INT,
      saved DATE
  );  

dim_mensajero: |
  CREATE TABLE IF NOT EXISTS data_mart_entregas.dim_mensajero (
      id_mensajero INT PRIMARY KEY,
      activo BOOLEAN,
      saved DATE
  );

dim_novedad: |
  CREATE TABLE IF NOT EXISTS data_mart_novedades.dim_novedad (
      id_tipo_novedad INT PRIMARY KEY,
      tipo_novedad VARCHAR(100),
      saved DATE
  );

dim_mensajero_novedades: |
  CREATE TABLE IF NOT EXISTS data_mart_novedades.dim_mensajero (
      id_mensajero INT PRIMARY KEY,
      activo BOOLEAN,
      saved DATE
  );

dim_tiempo_novedades: |
  CREATE TABLE IF NOT EXISTS data_mart_novedades.dim_tiempo (
      id_tiempo INT PRIMARY KEY,
      fecha DATE,
      año INT,
      mes INT,
      semana INT,
      dia INT,
      fin_de_semana BOOLEAN,
      saved DATE
  );

hecho_novedad: |
  CREATE TABLE IF NOT EXISTS data_mart_novedades.hecho_novedad (
      id_novedad_servicio INT PRIMARY KEY,
      id_tipo_novedad INT,
      id_mensajero INT,
      id_tiempo INT,
      id_hora INT,
      cod_servicio INT,
      cantidad_novedades INT,
      saved DATE
  );

hecho_seguimiento_estado: |
  CREATE TABLE IF NOT EXISTS data_mart_entregas.hecho_seguimiento_estado (
      id_estado_servicio INT PRIMARY KEY,
      id_estado INT,
      id_mensajero INT,
      id_tiempo_estado_inicio INT,
      id_tiempo_estado_fin INT,
      duracion_tiempo_estado INT,
      id_hora INT,
      cod_servicio INT
  );